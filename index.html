<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kiro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --primary: #888;
            --secondary: #555;
            --accent: #aaa;
            --bg: #0a0a0c;
            --glass: rgba(12, 12, 16, 0.75);
            --border-glow: rgba(255, 255, 255, 0.08);
            --text-light: #f0f0f0;
            --text-muted: #b0b0b0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #18181e 0%, transparent 55%),
                radial-gradient(circle at 80% 70%, #14141a 0%, transparent 55%);
        }

        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(90px);
            z-index: 0;
            opacity: 0.12;
            animation: move 22s infinite alternate ease-in-out;
            background: #6a6a7a;
        }
        .blob-1 {
            top: -15%;
            left: -15%;
            background: #5f5f6f;
        }
        .blob-2 {
            bottom: -15%;
            right: -15%;
            background: #4a4a5a;
            animation-delay: -7s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(120px, 90px) scale(1.3); }
        }

        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(150%);
            -webkit-backdrop-filter: blur(28px) saturate(150%);
            border-radius: 3rem;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.02);
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(180, 180, 180, 0.25);
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.95), 0 0 30px rgba(160, 160, 160, 0.08);
        }

        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 2rem;
            padding: 4px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a6a7a, #3a3a46, #8a8a9a, #4a4a5a);
            background-size: 300% 300%;
            animation: gradientRotate 8s ease-in-out infinite alternate;
            box-shadow: 0 0 30px rgba(120, 120, 130, 0.2);
        }

        @keyframes gradientRotate {
            0% { background-position: 0% 30%; }
            100% { background-position: 100% 70%; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #0a0a0c;
            transition: transform 0.5s ease, filter 0.3s;
            filter: grayscale(0.6) contrast(1.1);
        }

        .glass-card:hover .avatar {
            transform: scale(1.03) rotate(1.5deg);
            filter: grayscale(0.3) contrast(1.2);
        }

        .neon-nick {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #f5f5f7 25%, #b8b8c0 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .divider {
            height: 1px;
            width: 70px;
            background: linear-gradient(90deg, transparent, #9a9aaa, transparent);
            margin: 0 auto 2rem;
            opacity: 0.5;
        }

        .social-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #b0b0bc;
            font-size: 1.6rem;
            transition: all 0.25s ease;
            text-decoration: none;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
        }

        .social-link:hover {
            background: rgba(220, 220, 230, 0.08);
            transform: translateY(-6px) scale(1.04);
            border-color: #c0c0d0;
            color: #ffffff;
            box-shadow: 0 12px 28px rgba(100, 100, 120, 0.2);
        }

        .social-link.tg:hover { color: #b8c8e8; border-color: #b8c8e8; }
        .social-link.x:hover { color: #d0d0dc; border-color: #d0d0dc; }
        .social-link.forum:hover { color: #d4b8c8; border-color: #d4b8c8; }
        .social-link.bhf:hover { color: #e0d8b0; border-color: #e0d8b0; }

        @media (max-width: 400px) {
            .neon-nick { font-size: 2.4rem; }
            .avatar-wrapper { width: 130px; height: 130px; }
            .social-link { width: 48px; height: 48px; font-size: 1.4rem; }
            .social-row { gap: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://i.pinimg.com/1200x/de/7a/1d/de7a1d4ee45fbd6a099c17e8b072420e.jpg" alt="kiro">
        </div>

        <h1 class="neon-nick">kiro</h1>

        <div class="divider"></div>

        <div class="social-row">
            <a class="social-link tg" href="https://t.me/kirosh1n" target="_blank" aria-label="Telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>

            <a class="social-link x" href="https://x.com/kirosh1n" target="_blank" aria-label="X (Twitter)">
                <i class="fab fa-x-twitter"></i>
            </a>

            <a class="social-link forum" href="https://femboyforum.com/u/Kiroshin" target="_blank" aria-label="Femboy Forum">
                <i class="fas fa-users"></i>
            </a>

            <a class="social-link bhf" href="https://bhf.pro/members/594516/" target="_blank" aria-label="BHF.pro">
                <i class="fas fa-crown"></i>
            </a>
        </div>
    </div>
</body>
</html>
