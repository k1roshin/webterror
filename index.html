<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kiro — social card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        :root {
            --primary: #a855f7;
            --secondary: #ec4899;
            --accent: #facc15;
            --bg: #0b0b0f;
            --glass: rgba(18, 18, 28, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #1e112e 0%, transparent 50%);
        }

        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }
        .blob-1 { background: var(--primary); top: -10%; left: -10%; }
        .blob-2 { background: var(--secondary); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .glass-card {
            position: relative;
            z-index: 10;
            max-width: 420px;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-radius: 3rem;
            padding: 3rem 2rem 2.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: rgba(168, 85, 247, 0.4);
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.9), 0 0 20px rgba(168, 85, 247, 0.2);
        }

        .avatar-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 2rem;
            padding: 5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 300% 300%;
            animation: gradientRotate 6s linear infinite;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
        }

        @keyframes gradientRotate {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--bg);
            transition: transform 0.5s ease;
        }

        .glass-card:hover .avatar {
            transform: scale(1.05) rotate(3deg);
        }

        .neon-nick {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff 30%, #c8c0e0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .divider {
            height: 1px;
            width: 60px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            margin: 0 auto 2rem;
            opacity: 0.6;
        }

        .social-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.25rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #c8c0e0;
            font-size: 1.6rem;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-6px) scale(1.05);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 12px 28px rgba(168, 85, 247, 0.25);
        }

        .social-link.tg:hover { color: #36a2eb; border-color: #36a2eb; }
        .social-link.x:hover { color: #e1e8ed; border-color: #e1e8ed; }
        .social-link.forum:hover { color: #ff6b9d; border-color: #ff6b9d; }
        .social-link.bhf:hover { color: #facc15; border-color: #facc15; }

        @media (max-width: 400px) {
            .neon-nick { font-size: 2.4rem; }
            .avatar-wrapper { width: 130px; height: 130px; }
            .social-link { width: 48px; height: 48px; font-size: 1.4rem; }
            .social-row { gap: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <div class="avatar-wrapper">
            <img class="avatar" src="https://i.pinimg.com/1200x/de/7a/1d/de7a1d4ee45fbd6a099c17e8b072420e.jpg" alt="kiro">
        </div>

        <h1 class="neon-nick">kiro</h1>

        <div class="divider"></div>

        <div class="social-row">
            <a class="social-link tg" href="https://t.me/kirosh1n" target="_blank" aria-label="Telegram">
                <i class="fab fa-telegram-plane"></i>
            </a>

            <a class="social-link x" href="https://x.com/kirosh1n" target="_blank" aria-label="X (Twitter)">
                <i class="fab fa-x-twitter"></i>
            </a>

            <a class="social-link forum" href="https://femboyforum.com/u/Kiroshin" target="_blank" aria-label="Femboy Forum">
                <i class="fas fa-users"></i>
            </a>

            <a class="social-link bhf" href="https://bhf.pro/members/594516/" target="_blank" aria-label="BHF.pro">
                <i class="fas fa-crown"></i>
            </a>
        </div>
    </div>
</body>
</html>
