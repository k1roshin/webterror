<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0f;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            margin: 0;
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #0a0a10 85%);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(ellipse, rgba(120, 80, 255, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 70%;
            height: 70%;
            background: radial-gradient(ellipse, rgba(255, 60, 180, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            position: relative;
            z-index: 2;
            max-width: 540px;
            width: 100%;
            background: rgba(18, 18, 28, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-radius: 4rem;
            padding: 2.8rem 2.2rem 3.2rem;
            box-shadow: 
                0 30px 60px -15px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .glass-card:hover {
            transform: translateY(-6px) scale(1.005);
            box-shadow: 
                0 40px 80px -12px #000000dd,
                0 0 0 1px rgba(255, 255, 255, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .avatar-glow {
            position: relative;
            width: 170px;
            height: 170px;
            margin: 0 auto 2rem;
            border-radius: 50%;
            padding: 4px;
            background: conic-gradient(from 120deg, #a855f7, #ec4899, #a855f7, #ec4899);
            background-size: 300% 300%;
            animation: rotateGlow 8s linear infinite;
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.25), 0 0 80px rgba(236, 72, 153, 0.15);
        }

        @keyframes rotateGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .avatar-glow::after {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg, #a855f7, #ec4899, #facc15, #a855f7);
            background-size: 300% 300%;
            animation: rotateGlow 10s linear infinite reverse;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
            pointer-events: none;
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            background: #0b0b0f;
            border: 2px solid rgba(255, 255, 255, 0.08);
            transition: filter 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .avatar:hover {
            filter: brightness(1.1) contrast(1.1) drop-shadow(0 0 18px #a855f766);
            transform: scale(1.02);
        }

        .neon-nick {
            font-size: 3.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f0eaff 0%, #d4c0ff 45%, #f9b8d4 80%, #facc15);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.25), 0 0 60px rgba(236, 72, 153, 0.1);
            margin-bottom: 0.2rem;
            line-height: 1.1;
            filter: drop-shadow(0 4px 6px #00000066);
        }

        .telegram-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0.7rem 2rem 0.7rem 1.8rem;
            border-radius: 80px;
            margin-top: 0.6rem;
            margin-bottom: 1.6rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.25s ease;
            text-decoration: none;
            color: #c8c0e0;
            font-weight: 500;
            font-size: 1.1rem;
            letter-spacing: 0.2px;
        }

        .telegram-badge:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(168, 85, 247, 0.3);
            color: #f0ecff;
            box-shadow: 0 8px 28px -6px #a855f733, 0 0 0 1px rgba(168, 85, 247, 0.15);
            transform: translateY(-2px);
        }

        .telegram-badge i {
            font-style: normal;
            font-size: 1.3rem;
            line-height: 1;
            filter: drop-shadow(0 0 8px #a855f744);
        }

        .divider-glow {
            width: 100px;
            height: 2px;
            margin: 1.8rem auto 1.8rem;
            background: linear-gradient(90deg, transparent, #a855f7, #ec4899, #facc15, transparent);
            border-radius: 10px;
            opacity: 0.5;
            box-shadow: 0 0 20px #a855f733;
        }

        .primary-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(145deg, #1e1a2e, #0f0d1a);
            padding: 0.9rem 2.8rem;
            border-radius: 80px;
            color: #e8e0ff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.15rem;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 30px -10px #000000bb, 0 0 0 1px #2a2440 inset;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            margin-top: 0.5rem;
            letter-spacing: 0.2px;
        }

        .primary-btn:hover {
            background: linear-gradient(145deg, #2a2340, #15112a);
            border-color: rgba(168, 85, 247, 0.3);
            box-shadow: 0 10px 40px -8px #a855f755, 0 0 0 1px #6d4b9e inset;
            transform: translateY(-3px) scale(1.02);
            color: #ffffff;
        }

        .primary-btn i {
            font-style: normal;
            font-size: 1.3rem;
        }

        @media (max-width: 500px) {
            .glass-card {
                padding: 2rem 1.2rem 2.2rem;
                border-radius: 2.8rem;
            }

            .avatar-glow {
                width: 140px;
                height: 140px;
            }

            .neon-nick {
                font-size: 2.6rem;
            }

            .telegram-badge {
                font-size: 0.95rem;
                padding: 0.5rem 1.4rem;
            }

            .primary-btn {
                font-size: 1rem;
                padding: 0.7rem 2rem;
            }
        }

        @media (max-width: 380px) {
            .avatar-glow {
                width: 110px;
                height: 110px;
            }

            .neon-nick {
                font-size: 2.1rem;
            }

            .telegram-badge {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
                gap: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="avatar-glow">
            <img 
                class="avatar" 
                src="https://i.pinimg.com/1200x/de/7a/1d/de7a1d4ee45fbd6a099c17e8b072420e.jpg" 
                alt="kiro"
                loading="lazy"
            />
        </div>

        <h1 class="neon-nick">kiro</h1>

        <a class="telegram-badge" href="https://t.me/kirosh1n" target="_blank" rel="noopener noreferrer">
            <i>✧</i> @kirosh1n
        </a>

        <div class="divider-glow"></div>

        <a class="primary-btn" href="https://t.me/kirosh1n" target="_blank" rel="noopener noreferrer">
            <i>⟡</i> Telegram
        </a>
    </div>
</body>
</html>
